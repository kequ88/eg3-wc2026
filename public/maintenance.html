<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Maintenance</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            background: #1a1a1e;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid #29292e;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #a8a8b3;
        }
        .badge {
            display: inline-block;
            margin-top: 24px;
            padding: 6px 12px;
            background: rgba(225, 225, 230, 0.06);
            border: 1px solid rgba(225, 225, 230, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: #04d361;
            font-weight: 600;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">⚽️</div>
        <h1>Pitch Maintenance</h1>
        <p>We are wiping the pitch for the WC2026 mini-tournament! We'll be back online shortly.</p>
        <div class="badge">● Reset in progress</div>
    </div>

</body>
</html>
